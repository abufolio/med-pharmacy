# ═══════════════════════════════════════════════
#  Pharmacy Cashback — Docker Compose
# ═══════════════════════════════════════════════
#  Development: docker compose up -d
#  Production:  docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ═══════════════════════════════════════════════

version: "3.9"

x-app-defaults: &app-defaults
  restart: unless-stopped
  networks:
    - pharmacy-network
  environment:
    - NODE_ENV=development
    - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/pharmacy_cashback
    - REDIS_URL=redis://redis:6379
    - REDIS_HOST=redis
    - REDIS_PORT=6379
    - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-super-safe-2024}
    - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-dev-refresh-secret-super-safe-2024}
    - API_PORT=4000
    - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
    - TELEGRAM_BOT=${TELEGRAM_BOT:-your-bot-token}
    - BOT_WEBHOOK_SECRET=${BOT_WEBHOOK_SECRET:-webhook-secret}
    - TELEGRAM_ADMIN_IDS=${TELEGRAM_ADMIN_IDS:-123456789}
    - SENTRY_DSN=${SENTRY_DSN:-}

services:
  # ── PostgreSQL ──────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - pharmacy-network
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: pharmacy_cashback
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis ───────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - pharmacy-network
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ── API Server ──────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP: api
    <<: *app-defaults
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:4000/api/v1/health || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Worker ──────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP: worker
    <<: *app-defaults
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Telegram Bot ────────────────────────────
  bot:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP: bot
    <<: *app-defaults
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Standalone Bot (development, hot-reload) ──
  bot-dev:
    build:
      context: ../bot
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    networks:
      - pharmacy-network
    env_file:
      - ../bot/.env
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/pharmacy_cashback
      - REDIS_URL=redis://redis:6379
    volumes:
      - ../bot/src:/app/src:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local

networks:
  pharmacy-network:
    driver: bridge
